<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Discord Clone - Chat</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="discord-app">
    <!-- Mobile overlays -->
    <div class="channel-overlay" id="channelOverlay"></div>
    <div class="channel-overlay" id="memberOverlay"></div>

    <!-- Column 1: Server List -->
    <nav class="server-list">
      <button class="channel-drawer-toggle" id="channelToggle" title="Mở/đóng phòng chat" aria-label="Menu kênh">☰</button>

      <div class="server-icon active" data-server="dm" title="Direct Messages">
        <svg fill="currentColor" width="28" height="28" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2zm4.5 14H7.5C6.67 16 6 15.33 6 14.5V9.5C6 8.67 6.67 8 7.5 8H16.5C17.33 8 18 8.67 18 9.5V14.5C18 15.33 17.33 16 16.5 16z"></path></svg>
      </div>

      <div class="server-separator"></div>

      <div class="server-icon active" data-server="main" title="Community Server" style="background-color:var(--accent);color:white;border-radius:16px;font-weight:bold;font-size:18px;">S1</div>
      <div class="server-icon" data-server="s2" title="Server 2" style="background-color:#2d9a6c;color:white;font-weight:bold;font-size:18px;">S2</div>

      <div class="server-icon" title="Thêm Server" style="color:#23a559;font-size:24px;font-weight:300;">+</div>
      <div class="server-icon" title="Khám phá" style="color:#23a559;font-size:24px;font-weight:300;">🧭</div>
    </nav>

    <!-- Column 2: Channel List -->
    <aside class="channel-list">
      <div class="channel-header">
        Community Server
        <span style="font-size:12px;">▼</span>
      </div>

      <div class="channels-scroll">
        <div class="category">KÊNH CHÁT</div>
        <div class="channel active" data-room="general">
          <span style="color:var(--text-muted);font-size:20px;">#</span> general
        </div>
        <div class="channel" data-room="thảo-luận">
          <span style="color:var(--text-muted);font-size:20px;">#</span> thảo-luận
        </div>

        <div class="category" style="margin-top:16px;">KÊNH THOẠI</div>
        <div class="channel" data-room="sảnh-chung">
          <span style="font-size:16px;">🔊</span> Sảnh chung
        </div>
      </div>

      <div class="user-section">
        <div class="avatar-wrapper">
          <div class="avatar" style="background-color:#ed4245;"></div>
          <div class="status-dot"></div>
        </div>
        <div class="user-info">
          <input type="text" id="username" class="user-name" value="You" maxlength="32" />
          <div class="user-id">#1337</div>
        </div>
        <div class="user-controls">
          <div class="user-btn" title="Tắt mic">🎤</div>
          <div class="user-btn" title="Tắt loa">🎧</div>
          <div class="user-btn" title="Cài đặt">⚙️</div>
        </div>
      </div>
    </aside>

    <!-- Column 3: Chat Area -->
    <main class="chat-area">
      <header class="chat-header">
        <div class="chat-title"><span>#</span> general</div>
        <div class="chat-tools">
          <div title="Thông báo">🔔</div>
          <div title="Ghim">📌</div>
          <div title="Thành viên">👥</div>
          <div class="search-bar">Tìm kiếm <span>🔍</span></div>
          <div title="Hộp thư">📥</div>
          <div title="Trợ giúp">❓</div>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" title="Tùy chọn" aria-label="Menu">⋮</button>
      </header>

      <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-item" data-action="notify">🔔 Thông báo</div>
        <div class="mobile-menu-item" data-action="pin">📌 Ghim</div>
        <div class="mobile-menu-item" data-action="members">👥 Thành viên</div>
        <div class="mobile-menu-item" data-action="help">❓ Trợ giúp</div>
      </div>

      <div class="messages-wrapper" id="messages"></div>

      <div class="chat-input-wrapper">
        <form id="composer" autocomplete="off">
          <!-- Reply bar: hiện khi bấm Reply -->
          <div class="reply-bar" id="replyBar">
            <span class="reply-bar-text" id="replyBarText"></span>
            <button type="button" class="reply-bar-close" id="replyBarClose" aria-label="Hủy trả lời">✕</button>
          </div>

          <div class="chat-input-box">
            <input type="file" id="fileInput" hidden accept="image/*,.pdf,.txt,.zip" />
            <button type="button" id="attachBtn" class="attach-btn" title="Đính kèm">+</button>

            <!-- Emoji picker anchor -->
            <div class="emoji-picker-anchor" id="emojiInputAnchor">
              <button type="button" id="emojiInputBtn" class="emoji-input-btn" title="Emoji">😀</button>
            </div>

            <textarea id="messageInput" rows="1" placeholder="Gửi tin nhắn đến #general" autocomplete="off"></textarea>
            <button type="submit" class="send-btn" title="Gửi" aria-label="Gửi tin">➤</button>
          </div>
        </form>

        <div class="status-bar">
          <div id="typingIndicator" style="display:none;"><span id="typingText"></span></div>
          <div id="status">Connecting...</div>
          <div id="uploadStatus"></div>
        </div>
      </div>
    </main>

    <!-- Column 4: Member List (Desktop) -->
    <aside class="member-list" id="memberList">
      <div class="member-group">Trực tuyến — <span id="onlineCount">0</span></div>
      <div id="onlineMembersList"></div>

      <div class="member-group" style="margin-top:16px;">Ngoại tuyến — <span id="offlineCount">0</span></div>
      <div id="offlineMembersList"></div>
    </aside>

    <!-- Member List (Mobile drawer) -->
    <aside class="member-list member-drawer" id="memberDrawer">
      <div class="member-group">Trực tuyến — <span id="onlineCountMobile">0</span></div>
      <div id="onlineMembersListMobile"></div>
      <div class="member-group" style="margin-top:16px;">Ngoại tuyến — <span id="offlineCountMobile">0</span></div>
      <div id="offlineMembersListMobile"></div>
    </aside>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
