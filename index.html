<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord Clone - Chat</title>
  <style>
    :root {
      --bg-server: #202225;
      --bg-channel: #2f3136;
      --bg-chat: #36393f;
      --bg-member: #2f3136;
      --text-normal: #dcddde;
      --text-muted: #8e9297;
      --header-primary: #ffffff;
      --channel-hover: #393c43;
      --accent: #5865F2;
      --accent-hover: #4752C4;
      --input-bg: #40444b;
      --divider: #ffffff0f;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: Inter, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", system-ui, sans-serif;
      color: var(--text-normal);
      background-color: var(--bg-chat);
      height: 100vh;
      overflow: hidden;
      display: flex;
      user-select: none;
    }

    .discord-app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* Column 1: Server List */
    .server-list {
      width: 72px;
      background-color: var(--bg-server);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 8px;
      overflow-y: auto;
    }
    
    .server-icon {
      width: 48px; 
      height: 48px;
      background-color: #36393f;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }
    
    .server-icon:hover {
      border-radius: 16px;
      background-color: var(--accent);
      color: white;
    }
    
    .server-icon.active {
      border-radius: 16px;
      background-color: var(--accent);
    }
    
    .server-icon::before {
      content: '';
      position: absolute;
      left: -12px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 0px;
      background: white;
      border-radius: 0 4px 4px 0;
      transition: all 0.2s ease;
    }
    
    .server-icon:hover::before {
      height: 20px;
    }
    .server-icon.active::before {
      height: 40px;
    }

    .server-separator {
      width: 32px;
      height: 2px;
      background-color: var(--divider);
      margin: 4px 0;
    }

    /* Column 2: Channel List */
    .channel-list {
      width: 240px;
      background-color: var(--bg-channel);
      display: flex;
      flex-direction: column;
    }
    
    .channel-header {
      height: 48px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--bg-server);
      font-weight: 600;
      color: var(--header-primary);
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .channel-header:hover {
      background-color: var(--channel-hover);
    }

    .channels-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 8px;
    }

    .category {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
    }
    .category:hover { color: var(--text-normal); }

    .channel {
      padding: 6px 8px;
      margin-bottom: 2px;
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
      font-weight: 500;
      transition: background-color 0.2s, color 0.2s;
    }
    .channel:hover {
      background-color: var(--channel-hover);
      color: var(--text-normal);
    }
    .channel.active {
      background-color: #393c43;
      color: var(--header-primary);
    }

    .user-section {
      height: 52px;
      background-color: #292b2f;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 8px;
    }
    
    .avatar-wrapper {
      position: relative;
    }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background-color: #f2f3f5;
    }
    .status-dot {
      width: 10px; height: 10px;
      background-color: #23a559;
      border-radius: 50%;
      position: absolute;
      bottom: -2px; right: -2px;
      border: 3px solid #292b2f;
    }

    .user-info {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .user-name {
      font-size: 14px; font-weight: 600; color: white;
      outline: none;
      background: transparent;
      border: none;
      width: 100%;
    }
    .user-id {
      font-size: 12px; color: var(--text-muted);
    }
    .user-controls {
      display: flex;
      gap: 4px;
    }
    .user-btn {
      width: 32px; height: 32px;
      border-radius: 4px;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer;
      transition: background-color 0.2s;
      color: var(--text-normal);
    }
    .user-btn:hover { background-color: var(--channel-hover); }

    /* Column 3: Chat Area */
    .chat-area {
      flex: 1;
      background-color: var(--bg-chat);
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .chat-header {
      height: 48px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--bg-server);
    }
    .chat-title {
      font-size: 16px; font-weight: 600; color: white;
      display: flex; gap: 8px; align-items: center;
    }
    .chat-title span { color: var(--text-muted); font-size: 24px; font-weight: 400; }
    
    .chat-tools { display: flex; gap: 16px; align-items: center; color: var(--text-muted); }
    .search-bar { background-color: var(--bg-server); padding: 4px 8px; border-radius: 4px; font-size: 14px; width: 144px; display: flex; justify-content: space-between; }
    
    .messages-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    
    .message {
      padding: 4px 16px;
      display: flex;
      gap: 16px;
      margin-top: 17px;
      position: relative;
    }
    .message:hover {
      background-color: var(--divider);
    }
    
    .msg-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background-color: #5865F2; /* Placeholder */
      flex-shrink: 0;
    }
    .msg-content-wrapper { flex: 1; min-width: 0; }
    .msg-header { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; }
    .msg-author { font-weight: 500; color: white; font-size: 16px; cursor: pointer; }
    .msg-author:hover { text-decoration: underline; }
    .msg-time { font-size: 12px; color: var(--text-muted); }
    .msg-content { font-size: 16px; color: var(--text-normal); line-height: 1.375rem; word-wrap: break-word; white-space: pre-wrap; }
    .message.deleted .msg-content { opacity: 0.5; font-style: italic; }
    
    .msg-actions {
      position: absolute; right: 16px; top: -16px;
      background-color: var(--bg-chat);
      border: 1px solid var(--divider);
      border-radius: 4px;
      display: none;
      box-shadow: 0 0 0 1px rgba(4,4,5,0.15);
    }
    .message:hover .msg-actions { display: flex; }
    .msg-action-btn {
      padding: 4px 8px; cursor: pointer; color: var(--text-muted); font-size: 14px;
    }
    .msg-action-btn:hover { background-color: var(--channel-hover); color: var(--text-normal); }
    .msg-action-btn.delete:hover { color: #ed4245; }

    .reactions-zone { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
    .reaction-btn {
      background: var(--channel-hover);
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 2px 6px;
      font-size: 14px;
      color: var(--text-normal);
      cursor: pointer;
    }
    .reaction-btn:hover { border-color: var(--text-muted); }
    .emoji-picker-btn {
      background: none; border: 1px dashed var(--divider);
      border-radius: 8px; padding: 2px 6px; cursor: pointer;
      color: var(--text-normal);
    }
    .emoji-picker-btn:hover { border-color: var(--text-muted); }

    .chat-input-wrapper {
      padding: 12px 16px 16px;
      flex-shrink: 0;
      width: 100%;
      min-height: auto;
      height: auto;
    }
    .chat-input-box {
      background-color: var(--input-bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 12px;
      min-height: 44px;
      width: 100%;
      flex-wrap: nowrap;
      overflow: visible;
    }
    #composer {
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .attach-btn {
      background: #b9bbbe; 
      color: var(--input-bg);
      width: 28px; 
      height: 28px; 
      border-radius: 50%;
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-weight: bold; 
      cursor: pointer; 
      border: none; 
      font-size: 18px;
      flex-shrink: 0;
      touch-action: manipulation;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
      padding: 0;
    }
    .attach-btn:active { transform: scale(0.95); }
    .attach-btn:hover { background: #dcddde; }
    #messageInput {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-normal);
      font-size: 16px;
      outline: none;
      min-height: 24px;
      min-width: 0;
      resize: none;
      -webkit-appearance: none;
      padding: 4px 0;
    }
    #messageInput::placeholder { color: var(--text-muted); }
    .send-btn {
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: 20px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      min-width: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      touch-action: manipulation;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
      padding: 0;
      transition: color 0.2s;
    }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:hover { color: var(--accent-hover); }
    
    .status-bar { padding-top: 4px; font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between;}

    .mobile-menu-btn {
      background: transparent; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 20px; padding: 0;
      display: none; width: 32px; height: 32px; align-items: center; justify-content: center;
      transition: color 0.2s;
      touch-action: manipulation;
    }
    .mobile-menu-btn:hover { color: var(--text-normal); }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 48px;
      right: 12px;
      background: var(--bg-chat);
      border: 1px solid var(--divider);
      border-radius: 8px;
      z-index: 1001;
      min-width: 160px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .mobile-menu.active { display: block; }

    .mobile-menu-item {
      padding: 8px 12px;
      cursor: pointer;
      color: var(--text-normal);
      font-size: 14px;
      border-bottom: 1px solid var(--divider);
      transition: background-color 0.2s;
      white-space: nowrap;
    }

    .mobile-menu-item:last-child { border-bottom: none; }
    .mobile-menu-item:hover { background-color: var(--channel-hover); }

    /* Mobile & Tablet Responsiveness */
    @media (max-width: 1200px) {
      .member-list { width: 180px; padding: 16px 4px; }
      .channel-list { width: 200px; }
    }

    @media (max-width: 768px) {
      .server-list { width: 60px; }
      .server-icon { width: 40px; height: 40px; }
      .channel-list { display: none; }
      .member-list { display: none; }
      .discord-app { display: flex; flex-direction: row; width: 100%; height: 100%; }
      .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
      .chat-header { height: 48px; padding: 0 12px; flex-shrink: 0; }
      .chat-title { font-size: 14px; }
      .chat-tools { display: none; }
      .mobile-menu-btn { display: flex; }
      .search-bar { display: none; }
      .messages-wrapper { padding: 8px 0; flex: 1; overflow-y: auto; min-height: 0; }
      .message { padding: 2px 12px; margin-top: 12px; gap: 8px; }
      .msg-avatar { width: 32px; height: 32px; }
      .msg-author { font-size: 14px; }
      .msg-time { font-size: 11px; }
      .msg-content { font-size: 14px; }
      .msg-actions { right: 8px; top: -12px; }
      .msg-action-btn { padding: 4px 6px; font-size: 12px; min-width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
      .chat-input-wrapper { padding: 8px 12px 12px; flex-shrink: 0; display: flex; flex-direction: column; width: 100%; }
      .chat-input-box { padding: 10px 12px; gap: 8px; border-radius: 6px; min-height: 40px; width: 100%; }
      .attach-btn { width: 26px; height: 26px; font-size: 16px; }
      #messageInput { font-size: 16px; min-height: 28px; }
    }

    @media (max-width: 480px) {
      body { font-size: 14px; }
      .server-list { width: 52px; padding: 8px 0; gap: 4px; }
      .server-icon { width: 36px; height: 36px; font-size: 18px; }
      .channel-drawer-toggle { left: 64px; font-size: 20px; }
      .discord-app { display: flex; flex-direction: row; width: 100%; height: 100%; }
      .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
      .chat-header { height: 44px; padding: 0 8px; gap: 8px; flex-shrink: 0; }
      .chat-title { font-size: 13px; gap: 4px; }
      .chat-title span { font-size: 18px; }
      .mobile-menu-btn { font-size: 18px; }
      .messages-wrapper { padding: 4px 0; flex: 1; overflow-y: auto; min-height: 0; }
      .message { padding: 2px 8px; margin-top: 10px; gap: 6px; }
      .msg-avatar { width: 28px; height: 28px; min-width: 28px; }
      .msg-author { font-size: 13px; }
      .msg-header { gap: 4px; }
      .msg-time { font-size: 10px; }
      .msg-content { font-size: 13px; line-height: 1.25rem; }
      .msg-actions { right: 8px; top: -12px; }
      .msg-action-btn { padding: 2px 4px; font-size: 12px; min-width: 24px; height: 24px; }
      .reactions-zone { gap: 2px; }
      .reaction-btn { padding: 2px 4px; font-size: 12px; }
      .chat-input-wrapper { padding: 8px 8px 12px; flex-shrink: 0; display: flex; flex-direction: column; width: 100%; }
      .chat-input-box { padding: 8px 10px; gap: 6px; border-radius: 4px; min-height: 38px; width: 100%; }
      .attach-btn { width: 24px; height: 24px; font-size: 14px; }
      #messageInput { font-size: 14px; min-height: 24px; }
      .user-section { height: 48px; }
      .status-bar { flex-direction: column; gap: 2px; font-size: 11px; }
    }

    /* Column 4: Member List */
    .member-list {
      width: 240px;
      background-color: var(--bg-member);
      padding: 24px 8px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .member-group {
      font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px;
    }
    .member {
      display: flex; align-items: center; gap: 12px; padding: 4px; border-radius: 4px; cursor: pointer; transition: background-color 0.2s;
    }
    .member:hover { background-color: var(--channel-hover); }
    
    .member-avatar { position: relative; }
    .member-avatar .avatar { width: 32px; height: 32px; }
    .member-name { font-size: 16px; font-weight: 500; color: var(--text-muted); }
    .member:hover .member-name { color: var(--text-normal); }

    .attachment-img {
      max-width: 400px;
      max-height: 300px;
      border-radius: 8px;
      margin-top: 8px;
      display: block;
    }
    .attachment-link { color: #00aff4; text-decoration: none; }
    .attachment-link:hover { text-decoration: underline; }

    /* Mobile Channel Drawer */
    .channel-drawer-toggle {
      display: none;
      position: absolute;
      top: 12px;
      left: 70px;
      z-index: 1000;
      background: transparent;
      border: none;
      color: var(--text-normal);
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
    }

    .channel-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 998;
    }

    .channel-overlay.active { display: block; }

    @media (max-width: 768px) {
      .channel-drawer-toggle { display: block; }
      
      .channel-list {
        position: fixed;
        left: -240px;
        top: 0;
        height: 100vh;
        z-index: 999;
        transition: left 0.3s ease;
      }

      .channel-list.drawer-open {
        left: 60px;
      }

      .discord-app { position: relative; }
    }
  </style>
</head>
<body>
  <div class="discord-app">
    <!-- Channel Drawer Overlay (Mobile) -->
    <div class="channel-overlay" id="channelOverlay"></div>

    <!-- Column 1: Server List -->
    <nav class="server-list">
      <button class="channel-drawer-toggle" id="channelToggle" title="Mở/đóng phòng chat">☰</button>
      <div class="server-icon active" title="Direct Messages">
        <svg fill="white" width="28" height="28" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2zm4.5 14H7.5C6.67 16 6 15.33 6 14.5V9.5C6 8.67 6.67 8 7.5 8H16.5C17.33 8 18 8.67 18 9.5V14.5C18 15.33 17.33 16 16.5 16z"></path></svg>
      </div>
      <div class="server-separator"></div>
      <div class="server-icon" style="background-color: var(--accent); color: white; border-radius: 16px; font-weight: bold; font-size: 20px;">S1</div>
      <div class="server-icon" style="background-color: #2d9a6c; color: white; border-radius: 50%; font-weight: bold; font-size: 20px;">S2</div>
      
      <div class="server-icon" title="Add a Server" style="color: #23a559; background-color: #36393f; font-size: 24px; font-weight: 300;">+</div>
      <div class="server-icon" title="Explore" style="color: #23a559; background-color: #36393f; font-size: 24px; font-weight: 300;">🧭</div>
    </nav>

    <!-- Column 2: Channel List -->
    <div class="channel-list">
      <div class="channel-header">
        Community Server
        <span style="font-size: 12px;">▼</span>
      </div>
      <div class="channels-scroll">
        <div class="category">
          <span style="margin-right: 4px; font-size: 10px;"></span> KÊNH CHÁT
        </div>
        <div class="channel active">
          <span style="color: var(--text-muted); font-size: 20px;">#</span> general
        </div>
        <div class="channel">
          <span style="color: var(--text-muted); font-size: 20px;">#</span> thảo-luận
        </div>
        
        <div class="category" style="margin-top: 16px;">
          <span style="margin-right: 4px; font-size: 10px;"></span> KÊNH THOẠI
        </div>
        <div class="channel">
          <span style="color: var(--text-muted); font-size: 16px;">🔊</span> Sảnh chung
        </div>
      </div>
      
      <div class="user-section">
        <div class="avatar-wrapper">
          <div class="avatar" style="background-color: #ed4245;"></div>
          <div class="status-dot"></div>
        </div>
        <div class="user-info">
          <input type="text" id="username" class="user-name" value="You" />
          <div class="user-id">#1337</div>
        </div>
        <div class="user-controls">
          <div class="user-btn" title="Mute">🎤</div>
          <div class="user-btn" title="Deafen">🎧</div>
          <div class="user-btn" title="Settings">⚙️</div>
        </div>
      </div>
    </div>

    <!-- Column 3: Chat Area -->
    <main class="chat-area">
      <div class="chat-header">
        <div class="chat-title">
          <span>#</span> general
        </div>
        <div class="chat-tools">
          <div>🔔</div>
          <div>📌</div>
          <div>👥</div>
          <div class="search-bar">Search <span>🔍</span></div>
          <div>📥</div>
          <div>❓</div>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" title="Tùy chọn">⋮</button>
      </div>

      <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-item" data-action="notify">🔔 Thông báo</div>
        <div class="mobile-menu-item" data-action="pin">📌 Ghim</div>
        <div class="mobile-menu-item" data-action="members">👥 Thành viên</div>
        <div class="mobile-menu-item" data-action="help">❓ Trợ giúp</div>
      </div>
      
      <div class="messages-wrapper" id="messages">
        <!-- Messages will render here -->
      </div>
      
      <div class="chat-input-wrapper">
        <form id="composer" autocomplete="off">
          <div class="chat-input-box">
            <input type="file" id="fileInput" hidden />
            <button type="button" id="attachBtn" class="attach-btn" title="Đính kèm">+</button>
            <input type="text" id="messageInput" placeholder="Gửi tin nhắn đến #general" autocomplete="off" />
            <button type="submit" class="send-btn" title="Gửi">📤</button>
          </div>
        </form>
        <div class="status-bar">
          <div id="typingIndicator" style="display: none;"><span id="typingText"></span></div>
          <div id="status">Connecting...</div>
          <div id="presence" style="display: none;"></div>
          <div id="uploadStatus"></div>
          <div class="title" style="display:none;"><p></p></div>
        </div>
      </div>
    </main>

    <!-- Column 4: Member List -->
  
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://shzxqulhxwmjdipjkwqe.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_l5VdADKMm4fwADcrpZn-VQ_xATGQb7w";
    const STORAGE_BUCKET = "chat-images";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: false }
    });

    const statusEl = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const usernameEl = document.getElementById("username");
    const composerEl = document.getElementById("composer");
    const messageInputEl = document.getElementById("messageInput");
    const fileInputEl = document.getElementById("fileInput");
    const attachBtnEl = document.getElementById("attachBtn");
    const sendBtnEl = document.getElementById("sendBtn");
    const titleSubtitleEl = document.querySelector(".title p");
    const uploadStatusEl = document.getElementById("uploadStatus");
    const presenceEl = document.getElementById("presence");
    const typingIndicatorEl = document.getElementById("typingIndicator");
    const typingTextEl = document.getElementById("typingText");
    const onlineCountEl = document.getElementById("onlineCount");
    const onlineMembersListEl = document.getElementById("onlineMembersList");

    const renderedIds = new Set();
    const messageReactions = {};
    const presenceUsers = {};
    let currentRoom = "general";
    let hasRoomColumn = true;
    let hasUsernameColumn = true;
    let hasContentColumn = true;
    let hasCreatedAtColumn = true;
    let hasUserIdColumn = false;

    const clientUserId = (() => {
      const cached = localStorage.getItem("chat_user_id");
      if (cached) return cached;
      const id = crypto.randomUUID();
      localStorage.setItem("chat_user_id", id);
      return id;
    })();

    if (titleSubtitleEl) { titleSubtitleEl.textContent = "Discord UI Clone"; }

    const ensureEmptyState = () => {
      // show a simple empty state banner if there are no messages
      if (!messagesEl.querySelector('.message')) {
        const div = document.createElement('div');
        div.className = 'message';
        div.style.padding = '24px 16px';
        div.style.textAlign = 'center';
        div.style.color = 'var(--text-muted)';
        div.textContent = 'Welcome to #general — Chưa có tin nhắn.';
        messagesEl.appendChild(div);
      }
    };

    const clearMessages = () => {
      renderedIds.clear();
      messagesEl.innerHTML = "";
      ensureEmptyState();
    };

    const cachedName = localStorage.getItem("chat_name");
    if (cachedName) { usernameEl.value = cachedName; }

    usernameEl.addEventListener("change", () => {
      localStorage.setItem("chat_name", usernameEl.value.trim());
    });

    const formatTime = (isoString) => {
      try { return new Date(isoString).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' }); } 
      catch { return "--:--"; }
    };

    const setStatus = (text, type = "") => {
      statusEl.textContent = text;
      statusEl.style.color = type === 'error' ? '#ed4245' : type === 'live' ? '#23a559' : 'var(--text-muted)';
    };

    const encodeAttachmentMarker = ({ name, mime, url }) => {
      return `[[file:${encodeURIComponent(name)}:${encodeURIComponent(mime || "application/octet-stream")}:${encodeURIComponent(url)}]]`;
    };

    const parseAttachmentMarker = (raw) => {
      if (typeof raw !== "string") return null;
      const match = raw.match(/^\[\[file:([^:]*):([^:]*):(.+)\]\]$/);
      if (!match) return null;
      try {
        return {
          name: decodeURIComponent(match[1] || "file"),
          mime: decodeURIComponent(match[2] || "application/octet-stream"),
          url: decodeURIComponent(match[3] || "")
        };
      } catch { return null; }
    };

    function processMessageContent(content, msgContentEl) {
        msgContentEl.innerHTML = "";
        const lines = content.split('\n');
        for (const line of lines) {
            const attachment = parseAttachmentMarker(line.trim());
            if (attachment) {
                const link = document.createElement("a");
                link.className = "attachment-link";
                link.href = attachment.url;
                link.target = "_blank";
                link.textContent = attachment.name;
                msgContentEl.appendChild(link);
                msgContentEl.appendChild(document.createElement("br"));

                if (attachment.mime.startsWith("image/")) {
                    const img = document.createElement("img");
                    img.className = "attachment-img";
                    img.src = attachment.url;
                    msgContentEl.appendChild(img);
                    msgContentEl.appendChild(document.createElement("br"));
                }
            } else {
                msgContentEl.appendChild(document.createTextNode(line));
                msgContentEl.appendChild(document.createElement("br"));
            }
        }
    }

    const getAvatarColor = (name) => {
        const colors = ['#5865F2', '#ed4245', '#fee75c', '#ea2652', '#9b59b6', '#23a559'];
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        return colors[Math.abs(hash) % colors.length];
    };

    const appendMessage = (message) => {
      if (hasRoomColumn && message.room_id !== currentRoom) return;
      if (!message || renderedIds.has(message.id)) return;

      renderedIds.add(message.id);
      
      const isDeleted = message.content === "[deleted]";

      const msgDiv = document.createElement("div");
      msgDiv.className = "message";
      if (isDeleted) msgDiv.classList.add("deleted");
      msgDiv.setAttribute("data-message-id", message.id);

      const sender = message.username || message.user_id || "unknown";
      
      const avatarDiv = document.createElement("div");
      avatarDiv.className = "msg-avatar";
      avatarDiv.style.backgroundColor = getAvatarColor(sender);

      const contentWrapper = document.createElement("div");
      contentWrapper.className = "msg-content-wrapper";

      const header = document.createElement("div");
      header.className = "msg-header";
      header.innerHTML = `<span class="msg-author">${escapeHtml(sender)}</span><span class="msg-time">${formatTime(message.created_at)}</span>`;

      const contentEl = document.createElement("div");
      contentEl.className = "msg-content";
      
      const rawContent = message.content || message.message || "";
      if (isDeleted) {
        contentEl.textContent = "Tin nhắn này đã bị xóa.";
      } else {
        processMessageContent(rawContent, contentEl);
      }

      contentWrapper.appendChild(header);
      contentWrapper.appendChild(contentEl);

      const actionsDiv = document.createElement("div");
      actionsDiv.className = "msg-actions";
      
      const addReactionBtn = document.createElement("div");
      addReactionBtn.className = "msg-action-btn";
      addReactionBtn.textContent = "😀";
      addReactionBtn.onclick = () => addReaction(message.id, "👍");

      const deleteBtn = document.createElement("div");
      deleteBtn.className = "msg-action-btn delete";
      deleteBtn.innerHTML = "🗑️";
      deleteBtn.onclick = () => deleteMessage(message.id, message.username);

      actionsDiv.appendChild(addReactionBtn);
      actionsDiv.appendChild(deleteBtn);

      msgDiv.appendChild(avatarDiv);
      msgDiv.appendChild(contentWrapper);
      msgDiv.appendChild(actionsDiv);

      loadReactionsForMessage(message.id).then(() => {
        renderReactionsForMessage(contentWrapper, message.id);
      });

      messagesEl.appendChild(msgDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    };

    const escapeHtml = (unsafe = "") =>
      unsafe
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    const setUploadStatus = (text, isError = false) => {
      uploadStatusEl.textContent = text;
      uploadStatusEl.style.color = isError ? '#ed4245' : 'var(--text-muted)';
    };

    const updatePresenceInfo = () => {
      const count = Object.keys(presenceUsers).length;
      onlineCountEl.textContent = count;
      
      onlineMembersListEl.innerHTML = '';
      
      Object.keys(presenceUsers).forEach(key => {
          const user = presenceUsers[key];
          const div = document.createElement("div");
          div.className = "member";
          div.innerHTML = `
            <div class="member-avatar">
              <div class="avatar" style="background-color: ${getAvatarColor(user.username)};"></div>
              <div class="status-dot"></div>
            </div>
            <div class="member-name">${escapeHtml(user.username)}</div>
          `;
          onlineMembersListEl.appendChild(div);
      });
    };

    const updateTypingIndicator = () => {
      const typingUsers = Object.values(presenceUsers)
        .filter((u) => u.typing && u.username !== (usernameEl.value.trim() || "guest"))
        .map((u) => u.username);

      if (typingUsers.length === 0) {
        typingIndicatorEl.style.display = "none";
        return;
      }

      const names = typingUsers.join(", ");
      typingTextEl.textContent = typingUsers.length === 1 ? `${names} đang gõ...` : `${typingUsers.length} people typing...`;
      typingIndicatorEl.style.display = "block";
    };

    let typingTimeout = null;
    let presenceChannel = null;

    const broadcastTyping = async (isTyping) => {
      if (!presenceChannel) return;
      const username = usernameEl.value.trim() || "guest";
      presenceChannel.track({
        username,
        room: currentRoom,
        typing: isTyping,
        online_at: new Date().toISOString()
      });
    };

    const deleteMessage = async (messageId, messageUsername) => {
      if (messageUsername !== (usernameEl.value.trim() || "guest")) {
        setStatus("Chỉ có thể xóa tin nhắn của chính bạn", "error");
        return;
      }
      const { error } = await supabase.from("messages").update({ content: "[deleted]" }).eq("id", messageId);
      if (error) setStatus("Xóa thất bại", "error");
    };

    const loadReactionsForMessage = async (messageId) => {
      const { data, error } = await supabase.from("message_reactions").select("*").eq("message_id", messageId);
      if (error) return [];
      messageReactions[messageId] = data || [];
      return data || [];
    };

    const addReaction = async (messageId, emoji) => {
      const username = usernameEl.value.trim() || "guest";
      const { error } = await supabase.from("message_reactions").insert({ message_id: messageId, username, emoji });
      if (error && error.code === "23505") {
        await supabase.from("message_reactions").delete().eq("message_id", messageId).eq("username", username).eq("emoji", emoji);
      }
      await loadReactionsForMessage(messageId);
      const el = document.querySelector(`[data-message-id="${messageId}"] .msg-content-wrapper`);
      if (el) renderReactionsForMessage(el, messageId);
    };

    const renderReactionsForMessage = (contentWrapper, messageId) => {
      let zone = contentWrapper.querySelector(".reactions-zone");
      if (!zone) {
        zone = document.createElement("div");
        zone.className = "reactions-zone";
        contentWrapper.appendChild(zone);
      }
      zone.innerHTML = "";

      const reactions = messageReactions[messageId] || [];
      const grouped = {};
      reactions.forEach((r) => grouped[r.emoji] = (grouped[r.emoji] || 0) + 1);

      Object.entries(grouped).forEach(([emoji, count]) => {
        const btn = document.createElement("button");
        btn.type = "button"; btn.className = "reaction-btn"; btn.textContent = `${emoji} ${count}`;
        btn.onclick = (e) => { e.preventDefault(); addReaction(messageId, emoji); };
        zone.appendChild(btn);
      });

      if (Object.keys(grouped).length > 0) {
        const emojiBtn = document.createElement("button");
        emojiBtn.type = "button"; emojiBtn.className = "emoji-picker-btn"; emojiBtn.textContent = "😀+";
        emojiBtn.onclick = (e) => { e.preventDefault(); addReaction(messageId, ["❤️", "😂", "🔥", "😍", "🎉"][Math.floor(Math.random() * 5)]); };
        zone.appendChild(emojiBtn);
      }
    };

    const loadInitialMessages = async () => {
      let result = await supabase.from("messages").select("*").order("id", { ascending: true }).limit(100);
      if (result.error) { setStatus("Load failed", "error"); return; }
      
      const rows = result.data || [];
      if (rows.length > 0) {
        const sample = rows[0];
        hasRoomColumn = Object.prototype.hasOwnProperty.call(sample, "room_id");
        hasUsernameColumn = Object.prototype.hasOwnProperty.call(sample, "username");
        hasContentColumn = Object.prototype.hasOwnProperty.call(sample, "content");
        hasCreatedAtColumn = Object.prototype.hasOwnProperty.call(sample, "created_at");
        hasUserIdColumn = Object.prototype.hasOwnProperty.call(sample, "user_id");
      }

      const filtered = hasRoomColumn ? rows.filter((m) => m.room_id === currentRoom) : rows;
      filtered.forEach(appendMessage);
    };

    const tryInsertMessage = async (basePayload) => {
      const payload = { ...basePayload };
      for (let i = 0; i < 5; i += 1) {
        const { error } = await supabase.from("messages").insert(payload);
        if (!error) return null;
        
        const message = String(error.message || "").toLowerCase();
        if (error.code === "42703") {
          if (message.includes("room_id")) { delete payload.room_id; hasRoomColumn = false; continue; }
          if (message.includes("username")) { delete payload.username; hasUsernameColumn = false; continue; }
          if (message.includes("content")) { delete payload.content; hasContentColumn = false; continue; }
          if (message.includes("created_at")) { delete payload.created_at; hasCreatedAtColumn = false; continue; }
          if (message.includes("user_id")) { delete payload.user_id; hasUserIdColumn = false; continue; }
        }
        if (error.code === "23502" && message.includes("user_id")) { payload.user_id = clientUserId; hasUserIdColumn = true; continue; }
        return error;
      }
      return { message: "insert failed after compatibility retries" };
    };

    const sanitizeFilename = (name) => String(name || "file").replace(/[^a-zA-Z0-9._-]/g, "_").slice(0, 80);

    const uploadAndSendFile = async (file) => {
      if (!file) return;
      const username = usernameEl.value.trim() || "guest";
      localStorage.setItem("chat_name", username);

      const safeName = sanitizeFilename(file.name);
      const objectPath = `${currentRoom}/${Date.now()}-${crypto.randomUUID()}-${safeName}`;

      attachBtnEl.disabled = true;
      setUploadStatus(`Đang tải lên ${file.name}...`);

      let uploadError = null;
      try {
        const { error } = await supabase.storage.from(STORAGE_BUCKET).upload(objectPath, file, { upsert: false, contentType: file.type || "application/octet-stream" });
        if (error) uploadError = error;
      } catch (err) { uploadError = err; }

      if (uploadError) {
        attachBtnEl.disabled = false;
        setUploadStatus("Tải lên thất bại", true);
        setTimeout(() => setUploadStatus(""), 2000);
        return;
      }

      const { data: publicData } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(objectPath);
      const marker = encodeAttachmentMarker({ name: file.name, mime: file.type || "application/octet-stream", url: publicData.publicUrl });
      const payload = { content: marker, username, room_id: currentRoom, user_id: clientUserId };

      const insertError = await tryInsertMessage(payload);
      attachBtnEl.disabled = false;

      if (insertError) { setUploadStatus("Gửi file thất bại", true); setTimeout(() => setUploadStatus(""), 2000); return; }
      
      setUploadStatus(`✓ Đã gửi ${file.name}`);
      fileInputEl.value = "";
      messageInputEl.focus();
      setTimeout(() => setUploadStatus(""), 1500);
    };

    attachBtnEl.addEventListener("click", () => fileInputEl.click());
    fileInputEl.addEventListener("change", async () => { const file = fileInputEl.files && fileInputEl.files[0]; await uploadAndSendFile(file); });

    messageInputEl.addEventListener("input", () => {
      const hasText = messageInputEl.value.trim().length > 0;
      if (hasText) {
        broadcastTyping(true);
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => broadcastTyping(false), 1500);
      } else { broadcastTyping(false); }
    });

    composerEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      const username = usernameEl.value.trim() || "guest";
      const content = messageInputEl.value.trim();
      if (!content) return;

      localStorage.setItem("chat_name", username);
      messageInputEl.value = ""; // clear instantly for real feel
      
      const payload = { content, username, room_id: currentRoom, user_id: clientUserId };
      const error = await tryInsertMessage(payload);

      if (error) { setStatus("Gửi thất bại", "error"); }
      messageInputEl.focus();
    });

    presenceChannel = supabase.channel(`chat-presence:${currentRoom}`, { config: { broadcast: { ack: true }, presence: { key: clientUserId } } });
    presenceChannel.on("presence", { event: "sync" }, () => {
      presenceUsers.clear();
      Object.entries(presenceChannel.presenceState()).forEach(([key, states]) => {
        if (Array.isArray(states) && states[0] && states[0].room === currentRoom) {
          presenceUsers[key] = states[0];
        }
      });
      updatePresenceInfo();
      updateTypingIndicator();
    });
    presenceChannel.on("presence", { event: "join" }, () => { updatePresenceInfo(); updateTypingIndicator(); });
    presenceChannel.on("presence", { event: "leave" }, () => { updatePresenceInfo(); updateTypingIndicator(); });
    presenceChannel.subscribe(async (status) => {
      if (status === "SUBSCRIBED") {
        const username = usernameEl.value.trim() || "guest";
        await presenceChannel.track({ username, room: currentRoom, typing: false, online_at: new Date().toISOString() });
      }
    });

    const channel = supabase.channel("realtime-chat-room")
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages" }, (payload) => appendMessage(payload.new))
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "messages" }, (payload) => {
          // Handle deleted messages dynamically by reloading or updating the DOM
          const msgEl = document.querySelector(`[data-message-id="${payload.new.id}"]`);
          if (msgEl) {
              if (payload.new.content === "[deleted]") {
                  msgEl.classList.add("deleted");
                  const contentEl = msgEl.querySelector(".msg-content");
                  if (contentEl) contentEl.textContent = "Tin nhắn này đã bị xóa.";
              }
          }
      })
      .subscribe((status) => {
        if (status === "SUBSCRIBED") setStatus("Realtime: Connected", "live");
        else if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") setStatus("Realtime Error", "error");
      });

    window.addEventListener("beforeunload", async () => {
      await supabase.removeChannel(channel);
      if (presenceChannel) await supabase.removeChannel(presenceChannel);
    });

    // Switch active channel/room
    const chatTitleEl = document.querySelector('.chat-title');
    const switchRoom = async (room) => {
      if (!room || room === currentRoom) return;
      // remove old presence track
      try { if (presenceChannel) await supabase.removeChannel(presenceChannel); } catch(e) { /* ignore */ }
      currentRoom = room;
      // update header
      if (chatTitleEl) chatTitleEl.innerHTML = `<span>#</span> ${escapeHtml(room)}`;
      // clear and reload messages for room
      clearMessages();
      await loadInitialMessages();

      // create new presence channel for the new room
      presenceChannel = supabase.channel(`chat-presence:${currentRoom}`, { config: { broadcast: { ack: true }, presence: { key: clientUserId } } });
      presenceChannel.on("presence", { event: "sync" }, () => {
        Object.entries(presenceChannel.presenceState()).forEach(([key, states]) => {
          if (Array.isArray(states) && states[0] && states[0].room === currentRoom) {
            presenceUsers[key] = states[0];
          } else { delete presenceUsers[key]; }
        });
        updatePresenceInfo();
        updateTypingIndicator();
      });
      presenceChannel.on("presence", { event: "join" }, () => { updatePresenceInfo(); updateTypingIndicator(); });
      presenceChannel.on("presence", { event: "leave" }, () => { updatePresenceInfo(); updateTypingIndicator(); });
      presenceChannel.subscribe(async (status) => {
        if (status === "SUBSCRIBED") {
          const username = usernameEl.value.trim() || "guest";
          await presenceChannel.track({ username, room: currentRoom, typing: false, online_at: new Date().toISOString() });
        }
      });
      // update active class on channel list
      document.querySelectorAll('.channel').forEach(el => el.classList.toggle('active', el.dataset.room === currentRoom));
    };

    // attach click handlers to channel elements
    document.querySelectorAll('.channel').forEach((el) => {
      // ensure each channel element has a room data attribute
      if (!el.dataset.room) {
        const text = el.textContent.trim();
        el.dataset.room = text.split('\n')[0].replace('#', '').trim();
      }
      el.addEventListener('click', (e) => {
        const room = el.dataset.room || 'general';
        switchRoom(room);
      });
    });

    clearMessages();
    loadInitialMessages();

    // Mobile channel drawer toggle
    const channelToggle = document.getElementById("channelToggle");
    const channelList = document.querySelector(".channel-list");
    const channelOverlay = document.getElementById("channelOverlay");

    channelToggle.addEventListener("click", () => {
      channelList.classList.toggle("drawer-open");
      channelOverlay.classList.toggle("active");
    });

    channelOverlay.addEventListener("click", () => {
      channelList.classList.remove("drawer-open");
      channelOverlay.classList.remove("active");
    });

    // Close drawer when clicking a channel
    document.querySelectorAll(".channel").forEach((ch) => {
      ch.addEventListener("click", () => {
        if (window.innerWidth <= 768) {
          channelList.classList.remove("drawer-open");
          channelOverlay.classList.remove("active");
        }
      });
    });

    // Mobile menu toggle
    const mobileMenuBtn = document.getElementById("mobileMenuBtn");
    const mobileMenu = document.getElementById("mobileMenu");

    mobileMenuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      mobileMenu.classList.toggle("active");
    });

    document.addEventListener("click", () => {
      mobileMenu.classList.remove("active");
    });

    mobileMenu.addEventListener("click", (e) => {
      e.stopPropagation();
      const action = e.target.closest(".mobile-menu-item")?.getAttribute("data-action");
      if (action) {
        mobileMenu.classList.remove("active");
        // Actions can be expanded here
      }
    });
  </script>
</body>
</html>
